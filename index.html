<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>§ 86 SGB VIII – Interaktive Zuständigkeitsprüfung</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&family=Syne:wght@700;800&display=swap');

:root {
  --navy:   #ffffff;
  --navy2:  #ffffff;
  --navy3:  #f5f5f5;
  --blue:   #e8f0f8;
  --gold:   #1a3a5c;
  --gold2:  #1a3a5c;
  --light:  #111111;
  --muted:  #555555;
  --yes:    #1e6b4a;
  --yes2:   #27a06e;
  --no:     #7a2020;
  --no2:    #c0392b;
  --result: #e8f0f8;
  --warn:   #7a5c10;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  font-family: 'IBM Plex Sans', sans-serif;
  color: var(--light);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 0 60px;
}

/* ── HEADER ── */
.header {
  width: 100%;
  background: #1a3a5c;
  border-bottom: 2px solid #1a3a5c;
  padding: 30px 24px 24px;
  text-align: center;
}
.header .tag {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #a8c4e0;
  margin-bottom: 10px;
}
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(22px, 4vw, 38px);
  font-weight: 900;
  color: #fff;
  line-height: 1.2;
}
.header h1 em { color: #a8c4e0; font-style: normal; }
.header p { font-size: 13px; color: #a8c4e0; margin-top: 6px; font-weight: 300; }

/* ── MAIN AREA ── */
.main {
  width: 100%;
  max-width: 760px;
  padding: 32px 20px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

/* ── BREADCRUMB / PATH ── */
.path-bar {
  width: 100%;
  background: #f5f5f5;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 10px 16px;
  font-size: 11px;
  color: #555;
  margin-bottom: 24px;
  min-height: 36px;
  line-height: 1.6;
}
.path-bar .path-label { color: #1a3a5c; font-weight: 600; margin-right: 6px; }
.path-step {
  display: inline-block;
  background: #e8f0f8;
  border: 1px solid #b0c8e0;
  border-radius: 2px;
  padding: 1px 7px;
  margin: 2px 3px 2px 0;
  font-size: 10.5px;
  color: #111;
}
.path-step.yes { background: rgba(30,107,74,0.12); border-color: rgba(39,160,110,0.4); }
.path-step.no  { background: rgba(122,32,32,0.1); border-color: rgba(192,57,43,0.3); }

/* ── CARD ── */
.card {
  width: 100%;
  background: #ffffff;
  border: 1px solid #ccc;
  border-radius: 6px;
  overflow: hidden;
  animation: fadeSlide 0.28s ease both;
}
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-norm {
  background: #1a3a5c;
  border-bottom: 1px solid #1a3a5c;
  padding: 8px 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: none;
  color: #a8c4e0;
  display: flex;
  align-items: center;
  gap: 10px;
}
.card-norm .step-num {
  background: #ffffff;
  color: #1a3a5c;
  font-size: 10px;
  font-weight: 700;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.card-body { padding: 22px 24px 20px; }

.question {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  letter-spacing: -0.3px;
  font-size: clamp(17px, 2.5vw, 21px);
  color: #111;
  line-height: 1.6;
  margin-bottom: 14px;
  padding-bottom: 4px;
  overflow: visible;
}

.hint {
  background: #f0f4f8;
  border-left: 3px solid #1a3a5c;
  padding: 8px 12px;
  font-size: 12px;
  color: #333;
  line-height: 1.6;
  border-radius: 0 3px 3px 0;
  margin-bottom: 20px;
}
.hint strong { color: #1a3a5c; }

/* ── BUTTONS ── */
.btn-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  min-width: 140px;
  padding: 14px 20px;
  border: none;
  border-radius: 4px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s ease;
  letter-spacing: 0.3px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn:active { transform: translateY(0); }

.btn-ja {
  background: var(--yes);
  color: #fff;
  border: 1px solid rgba(39,160,110,0.4);
}
.btn-ja:hover { background: var(--yes2); }

.btn-nein {
  background: var(--no);
  color: #fff;
  border: 1px solid rgba(192,57,43,0.4);
}
.btn-nein:hover { background: var(--no2); }

.btn-icon { font-size: 18px; }

/* ── RESULT CARD ── */
.result-card {
  width: 100%;
  border-radius: 6px;
  overflow: hidden;
  animation: fadeSlide 0.3s ease both;
}

.result-header {
  padding: 14px 22px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}
.result-header .icon { font-size: 20px; }

.result-header.type-norm { background: #1a3a5c; color: #a8c4e0; }
.result-header.type-lja  { background: #7a2020; color: #fff; }
.result-header.type-sonder { background: #1e6b4a; color: #fff; }

.result-body {
  padding: 20px 22px 24px;
  background: #ffffff;
  border: 1px solid #ccc;
  border-top: none;
  border-radius: 0 0 6px 6px;
}

.result-norm {
  font-family: 'Playfair Display', serif;
  font-size: clamp(20px, 3vw, 26px);
  font-weight: 700;
  color: #111;
  margin-bottom: 6px;
}
.result-norm.lja-color { color: #7a2020; }
.result-norm.sonder-color { color: #1e6b4a; }

.result-text {
  font-size: 14px;
  line-height: 1.7;
  color: #222;
  margin-bottom: 14px;
}

.result-detail {
  background: #f5f7fa;
  border: 1px solid #ddd;
  border-radius: 4px;
  padding: 12px 14px;
  font-size: 12.5px;
  line-height: 1.7;
  color: #333;
}
.result-detail .dl { color: #1a3a5c; font-weight: 600; margin-right: 6px; }

/* ── KE BOX ── */
.ke-box {
  margin-top: 14px;
  background: #e8f0f8;
  border: 1px solid #b0c8e0;
  border-left: 4px solid #1a3a5c;
  border-radius: 0 4px 4px 0;
  padding: 10px 14px;
  font-size: 12.5px;
  line-height: 1.6;
  color: #111;
}
.ke-box strong { color: #1a3a5c; }

/* ── RESET ROW ── */
.reset-row {
  margin-top: 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.btn-reset {
  padding: 10px 20px;
  background: #e8f0f8;
  border: 1px solid #1a3a5c;
  color: #1a3a5c;
  border-radius: 4px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-reset:hover { background: #d0e0f0; }

.btn-back {
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--muted);
  color: var(--muted);
  border-radius: 4px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--light); color: var(--light); }

/* ── PROGRESS BAR ── */
.progress-wrap {
  width: 100%;
  margin-bottom: 20px;
}
.progress-label {
  font-size: 10px;
  color: #555;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 5px;
}
.progress-bar-bg {
  width: 100%;
  height: 3px;
  background: #ddd;
  border-radius: 2px;
}
.progress-bar-fill {
  height: 3px;
  background: linear-gradient(90deg, #1a3a5c, #4a7aac);
  border-radius: 2px;
  transition: width 0.3s ease;
}

/* ── CONNECTOR ── */
.connector {
  width: 2px;
  height: 24px;
  background: linear-gradient(to bottom, #1a3a5c, rgba(26,58,92,0.1));
  margin: 0 auto;
}

@media (max-width: 520px) {
  .btn-row { flex-direction: column; }
  .btn { min-width: 100%; }
}
</style>
</head>
<body>

<div id="pw-overlay" style="
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:9999;gap:16px;font-family:'IBM Plex Sans',sans-serif;">
  <div style="font-size:13px;color:#555;letter-spacing:1px;text-transform:uppercase">Zugang</div>
  <div style="font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:#1a3a5c">§ 86 SGB VIII · Prüfungsschema</div>
  <input id="pw-input" type="password" placeholder="Passwort eingeben"
    style="margin-top:8px;padding:12px 20px;font-size:16px;border:2px solid #1a3a5c;border-radius:4px;outline:none;width:280px;text-align:center;"
    onkeydown="if(event.key==='Enter') checkPw()" />
  <button onclick="checkPw()" style="
    padding:12px 32px;background:#1a3a5c;color:#fff;border:none;
    border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;">
    Weiter
  </button>
  <div id="pw-error" style="color:#c0392b;font-size:13px;display:none">Falsches Passwort.</div>
</div>

<script>
function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === 'rose') {
    document.getElementById('pw-overlay').style.display = 'none';
  } else {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
window.onload = function() {
  document.getElementById('pw-input').focus();
}
</script>


<div class="main">
  <div class="path-bar" id="pathBar">
    <span class="path-label">Pfad:</span> <span id="pathSteps">–</span>
  </div>

  <div class="progress-wrap">
    <div class="progress-label">Fortschritt</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div id="app"></div>
</div>

    ja: 'result_dauerpflege',

// ─────────────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────────────
let history = [];
let currentId = 'start';
const TOTAL_STEPS = 12;

// ─────────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────────
function render() {
  const node = nodes[currentId];
  const app = document.getElementById('app');

  // Progress
  const step = node.step || TOTAL_STEPS;
  const pct = Math.min(100, Math.round((step / TOTAL_STEPS) * 100));
  document.getElementById('progressFill').style.width = pct + '%';

  // Path
  renderPath();

  if (node.type === 'q') {
    app.innerHTML = `
      <div class="card">
        <div class="card-norm">
          <div class="step-num">${step}</div>
          ${node.norm}
        </div>
        <div class="card-body">
          <div class="question">${node.question}</div>
          ${node.hint ? `<div class="hint">${node.hint}</div>` : ''}
          <div class="btn-row">
            <button class="btn btn-ja" onclick="go('${node.ja}','Ja')">
              <span class="btn-icon">✓</span> Ja
            </button>
            <button class="btn btn-nein" onclick="go('${node.nein}','Nein')">
              <span class="btn-icon">✗</span> Nein
            </button>
          </div>
        </div>
      </div>
      <div class="connector"></div>
      <div class="reset-row">
        ${history.length > 0 ? `<button class="btn-back" onclick="goBack()">← Zurück</button>` : ''}
        <button class="btn-reset" onclick="reset()">↺ Neu starten</button>
      </div>
    `;
  } else {
    // Result
    const v = node.variant;
    const headerClass = v === 'lja' ? 'type-lja' : v === 'sonder' ? 'type-sonder' : 'type-norm';
    const normClass   = v === 'lja' ? 'lja-color' : v === 'sonder' ? 'sonder-color' : '';
    const icon        = v === 'lja' ? '⚠' : v === 'sonder' ? '★' : '✔';
    const label       = v === 'lja' ? 'Ergebnis: LJA als Kostenträger' : v === 'sonder' ? 'Ergebnis: Sonderzuständigkeit' : 'Ergebnis: Örtliche Zuständigkeit';

    const detailRows = (node.details || []).map(([k, v]) =>
      `<div><span class="dl">${k}:</span>${v}</div>`
    ).join('');

    app.innerHTML = `
      <div class="result-card">
        <div class="result-header ${headerClass}">
          <span class="icon">${icon}</span> ${label}
        </div>
        <div class="result-body">
          <div class="result-norm ${normClass}">${node.norm}</div>
          <div class="result-norm" style="font-size:16px;color:rgba(255,255,255,0.7);font-family:'IBM Plex Sans',sans-serif;font-weight:500;margin-bottom:12px">${node.title}</div>
          <div class="result-text">${node.text}</div>
          ${detailRows ? `<div class="result-detail">${detailRows}</div>` : ''}
          ${node.ke ? `<div class="ke-box"><strong>Kostenerstattung:</strong> ${node.ke}</div>` : ''}
        </div>
      </div>
      <div class="reset-row">
        <button class="btn-back" onclick="goBack()">← Zurück</button>
        <button class="btn-reset" onclick="reset()">↺ Neu starten</button>
      </div>
    `;
    document.getElementById('progressFill').style.width = '100%';
  }
}

function renderPath() {
  const bar = document.getElementById('pathSteps');
  if (history.length === 0) { bar.innerHTML = '–'; return; }
  bar.innerHTML = history.map(h =>
    `<span class="path-step ${h.answer === 'Ja' ? 'yes' : 'no'}">${h.norm}: ${h.answer}</span>`
  ).join('');
}

function go(nextId, answer) {
  const cur = nodes[currentId];
  history.push({ id: currentId, norm: cur.norm || currentId, answer });
  currentId = nextId;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  currentId = prev.id;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function reset() {
  history = [];
  currentId = 'start';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
render();
</script>
